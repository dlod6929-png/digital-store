<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff6b35' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z'/><polyline points='13 16 9 12 5 16'/><line x1='9' y1='12' x2='9' y2='21'/></svg>">
  <title>منتجات رقمية</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
      --primary: #ff6b35; --primary-rgb: 255, 107, 53;
      --border: #e2e8f0; --radius: 16px;
      --error: #ef4444; --success: #10b981;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.6; padding: 1rem; transition: background 0.4s, color 0.4s; }

    header { display: flex; justify-content: center; align-items: center; padding: 1rem 1.5rem; background: var(--card); border-radius: var(--radius); margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.3rem; font-weight: bold; color: var(--primary); }
    .logo i { font-size: 1.8rem; }

    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    
    .product-image { height: 180px; background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.1), rgba(var(--primary-rgb), 0.05)); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 4rem; border-bottom: 1px solid var(--border); }
    .product-content { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
    .product-card h3 { margin-bottom: 0.5rem; font-size: 1.2rem; }
    .price { color: var(--primary); font-weight: bold; font-size: 1.4rem; margin: 0.5rem 0; }
    .desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; flex-grow: 1; }
    
    .buy-btn { width: 100%; padding: 0.8rem; background: var(--primary); color: white; border: none; border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.3s ease; box-shadow: 0 4px 6px -1px rgba(var(--primary-rgb), 0.3); }
    .buy-btn:hover { box-shadow: 0 0 10px rgba(var(--primary-rgb), 0.5), 0 0 20px rgba(var(--primary-rgb), 0.3); transform: scale(1.02); }
    .buy-btn i { font-size: 1.2rem; }

    footer { text-align: center; margin-top: 4rem; padding: 1rem; color: var(--text-secondary); font-size: 0.9rem; }

    /* === النوافذ المنبثقة (Modals) === */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }
    .modal {
      background: var(--card);
      padding: 2rem;
      border-radius: var(--radius);
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
      transform: scale(0.9);
      transition: transform 0.3s ease;
      border: 1px solid var(--border);
    }
    .modal-overlay.active .modal {
      transform: scale(1);
    }
    .modal h3 {
      margin-bottom: 1rem;
      color: var(--text);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .modal p {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text);
      font-weight: 500;
    }
    .form-group input {
      width: 100%;
      padding: 0.75rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s;
    }
    .form-group input:focus {
      outline: none;
      border-color: var(--primary);
    }
    .form-group input.error {
      border-color: var(--error);
      animation: shake 0.5s ease-in-out;
    }
    .error-message {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .modal-buttons {
      display: flex;
      gap: 0.75rem;
    }
    .modal-buttons button {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-confirm {
      background: var(--primary);
      color: white;
    }
    .btn-confirm:hover {
      box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.4);
    }
    .btn-cancel {
      background: var(--border);
      color: var(--text);
    }
    .btn-cancel:hover {
      background: #cbd5e1;
    }
    .btn-copy {
      background: var(--success);
      color: white;
      margin-top: 1rem;
      width: 100%;
    }
    .btn-copy:hover {
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
    }
    .order-details {
      background: var(--bg);
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      font-family: monospace;
      font-size: 0.9rem;
      border: 1px solid var(--border);
    }
    .order-details div {
      margin: 0.5rem 0;
      display: flex;
      justify-content: space-between;
    }
    .order-details strong {
      color: var(--text);
    }
    .warning-box {
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
    }
    .warning-box p {
      margin: 0;
      color: #ffc107;
      font-weight: 500;
    }

    [data-theme="dark"] .btn-cancel:hover {
      background: #475569;
    }

    @media (max-width: 600px) { 
      .products { grid-template-columns: 1fr; }
      .modal { padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <i class="ph-bold ph-package"></i>
      <span id="siteName">منتجات رقمية</span>
    </div>
  </header>

  <main class="products" id="productsGrid"></main>

  <footer>
    <p id="footerText"> Digital Products 2026 ©  </p>
  </footer>

  <!-- النافذة المنبثقة للإيميل -->
  <div class="modal-overlay" id="emailModal">
    <div class="modal">
      <h3><i class="ph-bold ph-envelope"></i> <span data-i18n="emailTitle">إكمال عملية الشراء</span></h3>
      <p data-i18n="emailDesc">يرجى إدخال بريدك الإلكتروني لاستلام المنتج بعد الدفع</p>
      
      <div class="form-group">
        <label for="customerEmail" data-i18n="emailLabel">البريد الإلكتروني *</label>
        <input type="email" id="customerEmail" placeholder="example@email.com" required>
        <div class="error-message" id="emailError" data-i18n="emailError">يرجى إدخال بريد إلكتروني صحيح (أحرف إنجليزية فقط)</div>
      </div>
      
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeEmailModal()" data-i18n="cancel">إلغاء</button>
        <button class="btn-confirm" onclick="confirmPurchase()" data-i18n="confirm">تأكيد الشراء</button>
      </div>
    </div>
  </div>

  <!-- النافذة المنبثقة لنجاح الطلب -->
  <div class="modal-overlay" id="successModal">
    <div class="modal">
      <h3 style="color: var(--success);"><i class="ph-bold ph-check-circle"></i> <span data-i18n="successTitle">تم إنشاء طلبك بنجاح!</span></h3>
      <p data-i18n="successDesc">يرجى الاحتفاظ بمعلومات الطلب أدناه</p>
      
      <div class="order-details" id="orderDetails">
        <!-- سيتم ملؤها بالجافاسكربت -->
      </div>
      
      <div class="warning-box">
        <p><i class="ph-bold ph-warning"></i> <span data-i18n="warningText">احتفظ بمعلومات الطلب (رقم الطلب، البريد، اسم المنتج) للمتابعة والدعم الفني</span></p>
      </div>
      
      <button class="btn-copy" onclick="copyOrderDetails()">
        <i class="ph-bold ph-copy"></i> <span data-i18n="copyButton">نسخ المعلومات</span>
      </button>
      
      <div class="modal-buttons" style="margin-top: 1rem;">
        <button class="btn-cancel" onclick="closeSuccessModal()" data-i18n="close">إغلاق</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://digitalstore.dlod6929.workers.dev/api/products';
    const API_ORDERS_URL = API_URL.replace('/products', '/orders');

    // === النصوص المترجمة ===
    const texts = {
      ar: {
        siteName: "منتجات رقمية",
        footer: "© 2026 Digital Products. جميع الحقوق محفوظة.",
        buy: "شراء الآن",
        emailTitle: "إكمال عملية الشراء",
        emailDesc: "يرجى إدخال بريدك الإلكتروني لاستلام المنتج بعد الدفع",
        emailLabel: "البريد الإلكتروني *",
        emailError: "يرجى إدخال بريد إلكتروني صحيح (أحرف إنجليزية فقط)",
        cancel: "إلغاء",
        confirm: "تأكيد الشراء",
        successTitle: "تم إنشاء طلبك بنجاح!",
        successDesc: "يرجى الاحتفاظ بمعلومات الطلب أدناه",
        orderId: "رقم الطلب:",
        product: "المنتج:",
        email: "البريد:",
        warningText: "احتفظ بمعلومات الطلب (رقم الطلب، البريد، اسم المنتج) للمتابعة والدعم الفني",
        copyButton: "نسخ المعلومات",
        copied: "تم النسخ!",
        close: "إغلاق",
        processing: "جاري المعالجة..."
      },
      en: {
        siteName: "Digital Products",
        footer: "© 2026 Digital Products. All rights reserved.",
        buy: "Buy Now",
        emailTitle: "Complete Purchase",
        emailDesc: "Please enter your email to receive the product after payment",
        emailLabel: "Email Address *",
        emailError: "Please enter a valid email (English letters only)",
        cancel: "Cancel",
        confirm: "Confirm Purchase",
        successTitle: "Order Created Successfully!",
        successDesc: "Please save the order details below",
        orderId: "Order ID:",
        product: "Product:",
        email: "Email:",
        warningText: "Save your order details (Order ID, Email, Product Name) for follow-up and support",
        copyButton: "Copy Details",
        copied: "Copied!",
        close: "Close",
        processing: "Processing..."
      }
    };

    // === كشف اللغة والوضع ===
    const lang = navigator.language.startsWith('ar') ? 'ar' : 'en';
    const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    
    let selectedProductId = null;
    let selectedProductName = null;
    let currentOrderData = null;

    function applyLanguage() {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.title = texts[lang].siteName;
      document.getElementById('siteName').textContent = texts[lang].siteName;
      document.getElementById('footerText').textContent = texts[lang].footer;
      
      // ترجمة كل العناصر
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (texts[lang][key]) {
          el.textContent = texts[lang][key];
        }
      });
      
      renderProducts();
    }

    function applyTheme() {
      document.documentElement.setAttribute('data-theme', theme);
    }

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
    });

    async function renderProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: var(--text-secondary);">جاري تحميل المنتجات...</p>`;
      
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const result = await response.json();
        if (!result.success) throw new Error(result.error || 'خطأ غير معروف');
        
        const products = result.data;
        if (!products || products.length === 0) {
          grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: var(--text-secondary);">${lang === 'ar' ? 'لا توجد منتجات متاحة حالياً' : 'No products available'}</p>`;
          return;
        }
        
        grid.innerHTML = '';
        products.forEach(p => {
          const title = lang === 'ar' ? p.title_ar : p.title_en;
          const priceDisplay = `${p.price} ${p.currency || 'USD'}`;
          const icon = 'ph-package'; 
          
          grid.innerHTML += `
            <div class="product-card">
              <div class="product-image"><i class="ph-bold ${icon}"></i></div>
              <div class="product-content">
                <h3>${title}</h3>
                <div class="price">${priceDisplay}</div>
                <p class="desc">${lang === 'ar' ? 'منتج رقمي متميز' : 'Premium digital product'}</p>
                <button class="buy-btn" onclick="openEmailModal('${p.id}', '${title.replace(/'/g, "\\'")}')">
                  <i class="ph-bold ph-shopping-cart-simple"></i> ${texts[lang].buy}
                </button>
              </div>
            </div>
          `;
        });
      } catch (err) {
        console.error('Error loading products:', err);
        grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: red;">⚠️ ${lang === 'ar' ? 'فشل تحميل المنتجات' : 'Failed to load products'}</p>`;
      }
    }

    // === دوال النافذة المنبثقة للإيميل ===
    function openEmailModal(productId, productName) {
      selectedProductId = productId;
      selectedProductName = productName;
      document.getElementById('emailModal').classList.add('active');
      document.getElementById('customerEmail').focus();
      clearEmailError();
    }

    function closeEmailModal() {
      document.getElementById('emailModal').classList.remove('active');
      selectedProductId = null;
      selectedProductName = null;
      document.getElementById('customerEmail').value = '';
      clearEmailError();
    }

    function clearEmailError() {
      const input = document.getElementById('customerEmail');
      const error = document.getElementById('emailError');
      input.classList.remove('error');
      error.classList.remove('show');
    }

    function showEmailError() {
      const input = document.getElementById('customerEmail');
      const error = document.getElementById('emailError');
      input.classList.add('error');
      error.classList.add('show');
      setTimeout(() => clearEmailError(), 3000);
    }

    function isValidEmail(email) {
      // منع أي حرف غير ASCII
      if (!/^[\x00-\x7F]+$/.test(email)) return false;
      // التحقق من التنسيق
      const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!re.test(email)) return false;
      // منع Punycode
      if (email.includes('xn--')) return false;
      // يجب أن يحتوي على حروف إنجليزية
      const hasLetters = /[a-zA-Z]/.test(email);
      if (!hasLetters) return false;
      // الحد الأدنى للطول
      const parts = email.split('@');
      if (parts.length !== 2) return false;
      if (parts[0].length < 3) return false;
      if (!parts[1].includes('.')) return false;
      return true;
    }

    async function confirmPurchase() {
      const emailInput = document.getElementById('customerEmail');
      const email = emailInput.value.trim();
      
      if (!email) {
        showEmailError();
        emailInput.focus();
        return;
      }
      
      if (!isValidEmail(email)) {
        showEmailError();
        emailInput.focus();
        return;
      }
      
      const btn = event.target;
      const originalHTML = btn.innerHTML;
      
      btn.disabled = true;
      btn.innerHTML = `<i class="ph-bold ph-spinner-gap ph-spin"></i> ${texts[lang].processing}`;

      const orderData = {
        guest_email: email,
        payment_method: "shamcash",
        items: [{ product_id: selectedProductId, quantity: 1 }]
      };

      try {
        const response = await fetch(API_ORDERS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });

        const result = await response.json();

        if (result.success) {
          closeEmailModal();
          currentOrderData = {
            orderId: result.data.order_id,
            product: selectedProductName,
            email: email
          };
          showSuccessModal(currentOrderData);
        } else {
          alert(`${lang === 'ar' ? '⚠️ حدث خطأ: ' : '⚠️ Error: '}${result.error}`);
        }
      } catch (err) {
        console.error('Purchase error:', err);
        alert(lang === 'ar' ? '⚠️ فشل الاتصال بالخادم' : '⚠️ Failed to connect to server');
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalHTML;
      }
    }

    // === دوال نافذة النجاح ===
    function showSuccessModal(orderData) {
      const detailsDiv = document.getElementById('orderDetails');
      detailsDiv.innerHTML = `
        <div><strong>${texts[lang].orderId}</strong> <span>${orderData.orderId}</span></div>
        <div><strong>${texts[lang].product}</strong> <span>${orderData.product}</span></div>
        <div><strong>${texts[lang].email}</strong> <span>${orderData.email}</span></div>
      `;
      document.getElementById('successModal').classList.add('active');
    }

    function closeSuccessModal() {
      document.getElementById('successModal').classList.remove('active');
      currentOrderData = null;
    }

    function copyOrderDetails() {
      if (!currentOrderData) return;
      
      const textToCopy = `${texts[lang].orderId} ${currentOrderData.orderId}\n${texts[lang].product} ${currentOrderData.product}\n${texts[lang].email} ${currentOrderData.email}`;
      
      navigator.clipboard.writeText(textToCopy).then(() => {
        const btn = document.querySelector('.btn-copy');
        const originalHTML = btn.innerHTML;
        btn.innerHTML = `<i class="ph-bold ph-check"></i> ${texts[lang].copied}`;
        setTimeout(() => {
          btn.innerHTML = originalHTML;
        }, 2000);
      }).catch(err => {
        console.error('Copy failed:', err);
        alert(lang === 'ar' ? '⚠️ فشل النسخ' : '⚠️ Copy failed');
      });
    }

    // إغلاق النوافذ عند الضغط خارجها
    document.querySelectorAll('.modal-overlay').forEach(modal => {
      modal.addEventListener('click', function(e) {
        if (e.target === this) {
          if (this.id === 'emailModal') closeEmailModal();
          if (this.id === 'successModal') closeSuccessModal();
        }
      });
    });

    // إغلاق النوافذ بزر Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeEmailModal();
        closeSuccessModal();
      }
    });

    // إرسال النموذج بزر Enter
    document.getElementById('customerEmail').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        confirmPurchase();
      }
    });

// === التحقق من الإيميل (تصحيح المشكلة) ===
const emailInput = document.getElementById('customerEmail');

// إزالة الخطأ أثناء الكتابة (مش أثناء الكتابة)
emailInput.addEventListener('input', function(e) {
  const email = e.target.value.trim();
  // بس نزيل الأحمر أثناء الكتابة، وما بنفحص إلا إذا كان فارغ
  if (email) {
    e.target.classList.remove('error');
    // إذا الإيميل كامل وصحيح، نضيف الأخضر
    if (isValidEmail(email)) {
      e.target.style.borderColor = 'var(--success)';
    } else {
      e.target.style.borderColor = ''; // نرجع اللون الأصلي
    }
  } else {
    e.target.classList.remove('error');
    e.target.style.borderColor = '';
  }
});

// التحقق لما تخلص تكتب (لما تطلع من الخانة)
emailInput.addEventListener('blur', function(e) {
  const email = e.target.value.trim();
  if (email && !isValidEmail(email)) {
    showEmailError();
    e.target.style.borderColor = 'var(--error)';
  } else if (email && isValidEmail(email)) {
    e.target.style.borderColor = 'var(--success)';
  }
});

    applyLanguage();
    applyTheme();
    renderProducts();
  </script>
</body>
</html>
