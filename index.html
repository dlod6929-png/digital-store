<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff6b35' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z'/><polyline points='13 16 9 12 5 16'/><line x1='9' y1='12' x2='9' y2='21'/></svg>">
  <title>DigiFlow</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
      --primary: #ff6b35; --primary-rgb: 255, 107, 53;
      --border: #e2e8f0; --radius: 16px;
      --error: #ef4444; --success: #10b981;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.6; padding: 1rem; transition: background 0.4s, color 0.4s; }

    header { display: flex; justify-content: center; align-items: center; padding: 1rem 1.5rem; background: var(--card); border-radius: var(--radius); margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.3rem; font-weight: bold; color: var(--primary); }
    .logo i { font-size: 1.8rem; }

    .category-tabs {
      display: flex; justify-content: center; flex-wrap: wrap; gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .cat-btn {
      padding: 0.5rem 1rem; background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; cursor: pointer; font-size: 0.9rem; font-weight: 500;
      color: var(--text-secondary); transition: all 0.3s ease;
    }
    .cat-btn:hover { border-color: var(--primary); color: var(--primary); }
    .cat-btn.active {
      background: var(--primary); color: white; border-color: var(--primary);
      box-shadow: 0 2px 8px rgba(var(--primary-rgb), 0.3);
    }

    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    
    .product-image { height: 180px; background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.1), rgba(var(--primary-rgb), 0.05)); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 4rem; border-bottom: 1px solid var(--border); }
    .product-content { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
    
    .product-header { display: flex; flex-direction: column; margin-bottom: 1rem; }
    .product-header h3 { margin: 0 0 0.5rem 0; font-size: 1.2rem; text-align: start; }
    .product-header .price { margin: 0; color: var(--primary); font-weight: bold; font-size: 1.4rem; text-align: end; align-self: flex-end; }
    
    .desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; flex-grow: 1; min-height: 40px; }
    
    .buy-btn { width: 100%; padding: 0.8rem; background: transparent; color: var(--primary); border: 2px solid var(--primary); border-radius: 12px; cursor: pointer; font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.3s ease; }
    .buy-btn:hover { background: var(--primary); color: white; box-shadow: 0 0 10px rgba(var(--primary-rgb), 0.5), 0 0 20px rgba(var(--primary-rgb), 0.3); transform: scale(1.02); }
    .buy-btn i { font-size: 1.2rem; }

    .demo-btn { width: 100%; padding: 0.8rem; margin-top: 0.5rem; background: transparent; color: var(--text-secondary); border: 2px solid var(--border); border-radius: 12px; cursor: pointer; font-size: 0.9rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 0.5rem; transition: all 0.3s ease; }
    .demo-btn:hover { border-color: var(--primary); color: var(--primary); }

    footer { text-align: center; margin-top: 4rem; padding: 1rem; color: var(--text-secondary); font-size: 0.9rem; }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(4px); }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal { background: var(--card); padding: 2rem; border-radius: var(--radius); max-width: 400px; width: 90%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2); transform: scale(0.9); transition: transform 0.3s ease; border: 1px solid var(--border); }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal h3 { margin-bottom: 1rem; color: var(--text); font-size: 1.3rem; display: flex; align-items: center; gap: 0.5rem; }
    .modal p { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.95rem; line-height: 1.6; }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text); font-weight: 500; }
    .form-group input { width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px; font-size: 1rem; background: var(--bg); color: var(--text); transition: all 0.3s; }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    .form-group input.error { border-color: var(--error); animation: shake 0.5s ease-in-out; }
    .error-message { color: var(--error); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .error-message.show { display: block; }
    
    @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); } 20%, 40%, 60%, 80% { transform: translateX(5px); } }

    .modal-buttons { display: flex; gap: 0.75rem; }
    .modal-buttons button { flex: 1; padding: 0.75rem; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-confirm { background: var(--primary); color: white; }
    .btn-confirm:hover { box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.4); }
    .btn-cancel { background: var(--border); color: var(--text); }
    .btn-cancel:hover { background: #cbd5e1; }
    .btn-copy { background: var(--success); color: white; margin-top: 1rem; width: 100%; }
    .btn-copy:hover { box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); }
    
    .order-details { background: var(--bg); padding: 1rem; border-radius: 8px; margin: 1rem 0; font-family: monospace; font-size: 0.9rem; border: 1px solid var(--border); }
    .order-details div { margin: 0.5rem 0; display: flex; justify-content: space-between; }
    .order-details strong { color: var(--text); }
    
    .warning-box { background: rgba(255, 193, 7, 0.1); border: 1px solid #ffc107; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    .warning-box p { margin: 0; color: #d97706; font-weight: 500; }

    .demo-modal .modal { max-width: 90%; width: 95%; height: 90%; padding: 0; display: flex; flex-direction: column; }
    .demo-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); background: var(--card); border-radius: var(--radius) var(--radius) 0 0; }
    .demo-header h3 { margin: 0; font-size: 1.1rem; }
    .demo-header .btn-close { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text); }
    .demo-frame { flex: 1; border: none; border-radius: 0 0 var(--radius) var(--radius); background: #fff; }
    .demo-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); background: var(--card); display: flex; gap: 1rem; justify-content: flex-end; }
    .btn-buy-full { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
    .btn-buy-full:hover { box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.4); }

    [data-theme="dark"] .btn-cancel:hover { background: #475569; }
    @media (max-width: 600px) { .products { grid-template-columns: 1fr; } .modal { padding: 1.5rem; } .demo-modal .modal { width: 100%; height: 100%; border-radius: 0; } }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <i class="ph-bold ph-package"></i>
      <span id="siteName">DigiFlow</span>
    </div>
  </header>

  <div class="category-tabs" id="categoryTabs">
    <button class="cat-btn active" onclick="filterProducts('all')">الكل</button>
  </div>

  <main class="products" id="productsGrid"></main>

  <footer>
    <p id="footerText"> DigiFlow 2026 ©  </p>
  </footer>

  <div class="modal-overlay" id="emailModal">
    <div class="modal">
      <h3><i class="ph-bold ph-envelope"></i> <span data-i18n="emailTitle">إكمال الطلب</span></h3>
      <p data-i18n="emailDesc">يرجى إدخال بريدك الإلكتروني لاستلام المنتج</p>
      <div class="form-group">
        <label for="customerEmail" data-i18n="emailLabel">البريد الإلكتروني *</label>
        <input type="email" id="customerEmail" placeholder="example@email.com" required>
        <div class="error-message" id="emailError" data-i18n="emailError">يرجى إدخال بريد إلكتروني صحيح</div>
      </div>
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeEmailModal()" data-i18n="cancel">إلغاء</button>
        <button class="btn-confirm" onclick="confirmPurchase(event)" data-i18n="confirm">تأكيد</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="successModal">
    <div class="modal">
      <h3 style="color: var(--success);"><i class="ph-bold ph-check-circle"></i> <span data-i18n="successTitle">تم إنشاء طلبك!</span></h3>
      <p data-i18n="successDesc">سيتم معالجة طلبك خلال دقائق</p>
      <div class="order-details" id="orderDetails"></div>
      <div class="warning-box">
        <p><i class="ph-bold ph-warning"></i> <span data-i18n="warningText">احتفظ برقم الطلب للمتابعة</span></p>
      </div>
      <button class="btn-copy" onclick="copyOrderDetails()"><i class="ph-bold ph-copy"></i> <span data-i18n="copyButton">نسخ رقم الطلب</span></button>
      <div class="modal-buttons" style="margin-top: 1rem;">
        <button class="btn-cancel" onclick="closeSuccessModal()" data-i18n="close">إغلاق</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay demo-modal" id="demoModal">
    <div class="modal">
      <div class="demo-header">
        <h3 id="demoTitle">تجربة المنتج</h3>
        <button class="btn-close" onclick="closeDemoModal()">✕</button>
      </div>
      <iframe class="demo-frame" id="demoFrame" src="about:blank" title="Demo Preview"></iframe>
      <div class="demo-footer">
        <button class="btn-cancel" onclick="closeDemoModal()" data-i18n="close">إغلاق</button>
        <button class="btn-buy-full" onclick="buyFromDemo()"><i class="ph-bold ph-unlock"></i> <span data-i18n="buyFull">شراء النسخة الكاملة</span></button>
      </div>
    </div>
  </div>

  <script>
    const texts_ar = {
      siteName: "DigiFlow", footer: "DigiFlow 2026 © جميع الحقوق محفوظة.",
      buy: "شراء الآن", tryDemo: "🎁 جرب مجاناً", buyFull: "🔓 شراء النسخة الكاملة",
      emailTitle: "إكمال الطلب", emailDesc: "يرجى إدخال بريدك الإلكتروني لاستلام المنتج",
      emailLabel: "البريد الإلكتروني *", emailError: "يرجى إدخال بريد إلكتروني صحيح",
      cancel: "إلغاء", confirm: "تأكيد", processing: "جاري المعالجة...",
      successTitle: "تم إنشاء طلبك!", successDesc: "سيتم معالجة طلبك خلال دقائق",
      warningText: "احتفظ برقم الطلب للمتابعة", copyButton: "نسخ رقم الطلب", copied: "تم النسخ!",
      orderId: "رقم الطلب:", product: "المنتج:", email: "البريد:", amount: "المبلغ:",
      demoTitle: "تجربة المنتج", close: "إغلاق",
      loadingProducts: "جاري تحميل المنتجات...", noProducts: "لا توجد منتجات", loadFailed: "فشل التحميل",
      priceError: "⚠️ خطأ في سعر المنتج", productError: "⚠️ خطأ في المنتج", connectionError: "⚠️ فشل الاتصال",
      defaultDesc: "منتج رقمي متميز", catAll: "الكل"
    };
    const texts_en = {
      siteName: "DigiFlow", footer: "DigiFlow 2026 © All rights reserved.",
      buy: "Buy Now", tryDemo: "🎁 Try Free", buyFull: "🔓 Buy Full Version",
      emailTitle: "Complete Order", emailDesc: "Please enter your email to receive the product",
      emailLabel: "Email Address *", emailError: "Please enter a valid email",
      cancel: "Cancel", confirm: "Confirm", processing: "Processing...",
      successTitle: "Order Created!", successDesc: "Your order will be processed within minutes",
      warningText: "Save your order number for follow-up", copyButton: "Copy Order Number", copied: "Copied!",
      orderId: "Order ID:", product: "Product:", email: "Email:", amount: "Amount:",
      demoTitle: "Product Demo", close: "Close",
      loadingProducts: "Loading products...", noProducts: "No products available", loadFailed: "Failed to load",
      priceError: "⚠️ Invalid product price", productError: "Product not found", connectionError: "Connection failed",
      defaultDesc: "Premium digital product", catAll: "All"
    };

    const API_URL = 'https://digitalstore.dlod6929.workers.dev/api/products';
    const API_CATEGORIES_URL = 'https://digitalstore.dlod6929.workers.dev/api/categories';
    const API_ORDERS_URL = API_URL.replace('/products', '/orders');
    const DEMOS_FOLDER = 'demos/';
    const CONFIG = { CURRENCY: 'USDT' };

    let texts = {};
    const lang = navigator.language.startsWith('ar') ? 'ar' : 'en';
    const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    texts = lang === 'ar' ? texts_ar : texts_en;

    let currentCategory = 'all';
    let categoriesCache = [];
    let selectedProductId = null, selectedProductName = null, selectedProductPrice = null;
    let selectedProductDemoUrl = null, currentOrderData = null, productsCache = [];

    async function fetchCategories() {
      try {
        const response = await fetch(API_CATEGORIES_URL);
        if (response.ok) {
          const result = await response.json();
          if (result.success) categoriesCache = result.data;
        }
      } catch (err) { console.error('Error fetching categories:', err); }
    }

    function renderCategories() {
      const container = document.getElementById('categoryTabs');
      container.innerHTML = `<button class="cat-btn active" onclick="filterProducts('all')">${texts.catAll}</button>`;
      categoriesCache.forEach(cat => {
        if (cat.is_active) {
          const name = lang === 'ar' ? cat.name_ar : cat.name_en;
          container.innerHTML += `<button class="cat-btn" onclick="filterProducts('${cat.id}')">${name}</button>`;
        }
      });
    }

    function filterProducts(catId) {
      currentCategory = catId;
      document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderProducts();
    }

    async function renderProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: var(--text-secondary);">${texts.loadingProducts}</p>`;
      
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        const result = await response.json();
        if (!result.success) throw new Error(result.error || 'خطأ غير معروف');
        
        productsCache = result.data;
        
        const filtered = currentCategory === 'all' 
          ? productsCache 
          : productsCache.filter(p => p.category_id && p.category_id.startsWith(currentCategory));

        if (!filtered || filtered.length === 0) {
          grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: var(--text-secondary);">${texts.noProducts}</p>`;
          return;
        }
        
        grid.innerHTML = '';
        filtered.forEach(p => {
          const title = lang === 'ar' ? p.title_ar : p.title_en;
          const desc = (lang === 'ar' ? p.desc_ar : p.desc_en) || texts.defaultDesc;
          const priceDisplay = `${p.price} ${p.currency || CONFIG.CURRENCY}`;
          const hasDemo = p.demo_url && p.demo_url.trim() !== '';
          
          grid.innerHTML += `
            <div class="product-card">
              <div class="product-image"><i class="ph-bold ph-package"></i></div>
              <div class="product-content">
                <div class="product-header"><h3>${title}</h3><div class="price">${priceDisplay}</div></div>
                <p class="desc">${desc}</p>
                <button class="buy-btn" data-product-id="${p.id}" data-product-name="${title}" data-product-price="${p.price}" onclick="handleBuyClick(this)">
                  <i class="ph-bold ph-shopping-cart-simple"></i> ${texts.buy}
                </button>
                ${hasDemo ? `<button class="demo-btn" onclick="openDemo('${DEMOS_FOLDER + p.demo_url}', '${title}')"><i class="ph-bold ph-play-circle"></i> ${texts.tryDemo}</button>` : ''}
              </div>
            </div>`;
        });
      } catch (err) {
        console.error('Error:', err);
        grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: red;">⚠️ ${texts.loadFailed}</p>`;
      }
    }

    function openDemo(demoUrl, productName) {
      selectedProductDemoUrl = demoUrl; selectedProductName = productName;
      document.getElementById('demoFrame').src = demoUrl;
      document.getElementById('demoModal').classList.add('active');
    }
    function closeDemoModal() {
      document.getElementById('demoModal').classList.remove('active');
      document.getElementById('demoFrame').src = 'about:blank';
      selectedProductDemoUrl = null;
    }
    function buyFromDemo() {
      closeDemoModal();
      if (selectedProductName && selectedProductPrice) openEmailModal(selectedProductId, selectedProductName);
    }

    function handleBuyClick(button) {
      selectedProductId = button.dataset.productId;
      selectedProductName = button.dataset.productName;
      selectedProductPrice = parseFloat(button.dataset.productPrice);
      if (!selectedProductPrice || isNaN(selectedProductPrice)) { alert(texts.priceError); return; }
      openEmailModal(selectedProductId, selectedProductName);
    }

    function openEmailModal(productId, productName) {
      selectedProductId = productId;
      selectedProductName = productName || (lang === 'ar' ? 'منتج' : 'Product');
      document.getElementById('emailModal').classList.add('active');
      document.getElementById('customerEmail').focus();
      clearEmailError();
    }
    function closeEmailModal() {
      document.getElementById('emailModal').classList.remove('active');
      document.getElementById('customerEmail').value = '';
      clearEmailError();
    }
    function clearEmailError() {
      const input = document.getElementById('customerEmail');
      input.classList.remove('error');
      document.getElementById('emailError').classList.remove('show');
      input.style.borderColor = '';
    }
    function showEmailError() {
      const input = document.getElementById('customerEmail');
      input.classList.add('error');
      document.getElementById('emailError').classList.add('show');
      setTimeout(clearEmailError, 3000);
    }
    function isValidEmail(email) {
      return /^[\x00-\x7F]+$/.test(email) && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) && !email.includes('xn--') && /[a-zA-Z]/.test(email) && email.split('@')[0].length >= 3;
    }

    async function confirmPurchase(event) {
      const emailInput = document.getElementById('customerEmail');
      const email = emailInput.value.trim();
      if (!email || !isValidEmail(email)) { showEmailError(); emailInput.focus(); return; }
      
      const price = selectedProductPrice;
      if (!price || price <= 0 || isNaN(price)) { alert(texts.priceError); return; }
      if (!selectedProductName) { alert(texts.productError); return; }
      
      const btn = event.currentTarget;
      const originalHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<i class="ph-bold ph-spinner-gap ph-spin"></i> ${texts.processing}`;

      const orderData = { guest_email: email, payment_method: "manual", items: [{ product_id: selectedProductId, quantity: 1 }] };

      try {
        const response = await fetch(API_ORDERS_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(orderData) });
        const result = await response.json();
        if (result.success && result.data?.order_id) {
          closeEmailModal();
          currentOrderData = { orderId: result.data.order_id, product: selectedProductName, email: email, amount: price };
          showSuccessModal(currentOrderData);
          selectedProductId = selectedProductName = selectedProductPrice = selectedProductDemoUrl = null;
        } else {
          alert(`${lang === 'ar' ? '⚠️ خطأ: ' : '⚠️ Error: '}${result.error || 'فشل الإنشاء'}`);
        }
      } catch (err) {
        console.error('❌ Error:', err);
        alert(texts.connectionError);
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalHTML;
      }
    }

    function showSuccessModal(orderData) {
      document.getElementById('orderDetails').innerHTML = `
        <div><strong>${texts.orderId}</strong> <span>${orderData.orderId}</span></div>
        <div><strong>${texts.product}</strong> <span>${orderData.product}</span></div>
        <div><strong>${texts.email}</strong> <span>${orderData.email}</span></div>
        <div><strong>${texts.amount}</strong> <span>${orderData.amount} ${CONFIG.CURRENCY}</span></div>`;
      document.getElementById('successModal').classList.add('active');
    }
    function closeSuccessModal() { document.getElementById('successModal').classList.remove('active'); currentOrderData = null; }
    function copyOrderDetails() {
      if (!currentOrderData) return;
      const txt = `${texts.orderId} ${currentOrderData.orderId}\n${texts.product} ${currentOrderData.product}\n${texts.email} ${currentOrderData.email}`;
      navigator.clipboard.writeText(txt).then(() => {
        const btn = document.querySelector('#successModal .btn-copy');
        const old = btn.innerHTML;
        btn.innerHTML = `<i class="ph-bold ph-check"></i> ${texts.copied}`;
        setTimeout(() => btn.innerHTML = old, 2000);
      });
    }

    document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => {
      if (e.target === m) { if (m.id === 'emailModal') closeEmailModal(); else if (m.id === 'successModal') closeSuccessModal(); else if (m.id === 'demoModal') closeDemoModal(); }
    }));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeEmailModal(); closeSuccessModal(); closeDemoModal(); } });
    document.getElementById('customerEmail').addEventListener('keypress', e => { if (e.key === 'Enter') confirmPurchase(e); });
    const emailEl = document.getElementById('customerEmail');
    emailEl.addEventListener('input', function() { this.style.borderColor = this.value.trim() && isValidEmail(this.value.trim()) ? 'var(--success)' : ''; this.classList.remove('error'); });
    emailEl.addEventListener('blur', function() { if (this.value.trim() && !isValidEmail(this.value.trim())) showEmailError(); });

    async function init() {
      applyLanguage();
      applyTheme();
      await fetchCategories();
      renderCategories();
      renderProducts();
    }
    init();
  </script>
</body>
</html>
