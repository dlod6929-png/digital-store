<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تأكيد الطلب</title>
  <!-- أيقونات Phosphor (نفس المستخدمة بالموقع) -->
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
      --primary: #ff6b35; --primary-rgb: 255, 107, 53;
      --border: #e2e8f0; --radius: 16px;
      --error: #ef4444; --success: #10b981;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    body { 
      background: var(--bg); 
      color: var(--text); 
      line-height: 1.6; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      min-height: 100vh; 
      padding: 1rem; 
    }

    /* === ستايل القائمة فقط === */
    .modal {
      background: var(--card);
      padding: 2rem;
      border-radius: var(--radius);
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      border: 1px solid var(--border);
      text-align: center;
    }
    .modal h3 {
      margin-bottom: 1rem;
      color: var(--success);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .modal > p {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }
    
    .order-details {
      background: var(--bg);
      padding: 1rem;
      border-radius: 8px;
      margin: 1rem 0;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      border: 1px solid var(--border);
      text-align: right;
    }
    .order-details div {
      margin: 0.6rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
    }
    .order-details strong {
      color: var(--text);
      white-space: nowrap;
    }
    .order-details span {
      color: var(--text-secondary);
      word-break: break-all;
      text-align: left;
    }

    .warning-box {
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 1rem;
      margin: 1rem 0;
    }
    .warning-box p {
      margin: 0;
      color: #d97706;
      font-weight: 500;
      font-size: 0.9rem;
      display: flex;
      align-items: flex-start;
      gap: 0.5rem;
      text-align: right;
    }

    .btn-copy {
      background: var(--success);
      color: white;
      margin-top: 1rem;
      width: 100%;
      padding: 0.8rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1rem;
    }
    .btn-copy:hover { box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); transform: translateY(-1px); }
    .btn-copy:active { transform: translateY(0); }

    .btn-close {
      background: var(--border);
      color: var(--text);
      margin-top: 0.75rem;
      width: 100%;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.3s;
    }
    .btn-close:hover { background: #cbd5e1; }
    [data-theme="dark"] .btn-close:hover { background: #475569; }

    /* تأثير النسخ الناجح */
    .btn-copy.copied { background: #059669; }
  </style>
</head>
<body>

  <div class="modal">
    <h3><i class="ph-bold ph-check-circle"></i> تم إنشاء طلبك بنجاح!</h3>
    <p>يرجى الاحتفاظ بمعلومات الطلب أدناه</p>
    
    <div class="order-details" id="orderInfo">
      <!-- البيانات تُملأ تلقائياً أو يدوياً -->
      <div><strong>رقم الطلب:</strong> <span>f408cc15-d326-4fb9-9a64-13c27d63763f</span></div>
      <div><strong>المنتج:</strong> <span>قالب سيرة ذاتية احترافي</span></div>
      <div><strong>البريد:</strong> <span>dlo@mail.com</span></div>
    </div>
    
    <div class="warning-box">
      <p><i class="ph-bold ph-warning"></i> احتفظ بمعلومات الطلب (رقم الطلب، البريد، اسم المنتج) للمتابعة والدعم الفني</p>
    </div>
    
    <button class="btn-copy" id="copyBtn" onclick="copyDetails()">
      <i class="ph-bold ph-copy"></i> نسخ المعلومات
    </button>
    <button class="btn-close" onclick="alert('تم إغلاق النافذة (تجريبي)')">إغلاق</button>
  </div>

  <script>
    function copyDetails() {
      const orderDiv = document.getElementById('orderInfo');
      // استخراج النص النظيف
      const lines = Array.from(orderDiv.querySelectorAll('div')).map(div => {
        return div.innerText.replace('رقم الطلب:', 'Order ID:').replace('المنتج:', 'Product:').replace('البريد:', 'Email:');
      });
      const textToCopy = lines.join('\n');
      
      navigator.clipboard.writeText(textToCopy).then(() => {
        const btn = document.getElementById('copyBtn');
        btn.classList.add('copied');
        btn.innerHTML = '<i class="ph-bold ph-check"></i> تم النسخ!';
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = '<i class="ph-bold ph-copy"></i> نسخ المعلومات';
        }, 2000);
      }).catch(err => {
        console.error('فشل النسخ:', err);
        alert('فشل النسخ، يرجى النسخ يدوياً');
      });
    }
  </script>

</body>
</html>
