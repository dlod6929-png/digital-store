<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ff6b35' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z'/><polyline points='13 16 9 12 5 16'/><line x1='9' y1='12' x2='9' y2='21'/></svg>">
  <title>منتجات رقمية</title>
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  
  <style>
    :root {
      --bg: #f1f5f9; --card: #ffffff; --text: #0f172a; --text-secondary: #64748b;
      --primary: #ff6b35; --primary-rgb: 255, 107, 53;
      --border: #e2e8f0; --radius: 16px;
      --error: #ef4444; --success: #10b981;
    }
    [data-theme="dark"] {
      --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --text-secondary: #94a3b8;
      --border: #334155;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    body { background: var(--bg); color: var(--text); line-height: 1.6; padding: 1rem; transition: background 0.4s, color 0.4s; }

    header { display: flex; justify-content: center; align-items: center; padding: 1rem 1.5rem; background: var(--card); border-radius: var(--radius); margin-bottom: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); }
    .logo { display: flex; align-items: center; gap: 0.5rem; font-size: 1.3rem; font-weight: bold; color: var(--primary); }
    .logo i { font-size: 1.8rem; }

    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
    .product-card { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid var(--border); transition: transform 0.3s, box-shadow 0.3s; display: flex; flex-direction: column; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    
    .product-image { height: 180px; background: linear-gradient(135deg, rgba(var(--primary-rgb), 0.1), rgba(var(--primary-rgb), 0.05)); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 4rem; border-bottom: 1px solid var(--border); }
    .product-content { padding: 1.5rem; flex-grow: 1; display: flex; flex-direction: column; }
    
    /* ✅ تنسيق جديد لعنوان المنتج والسعر */
    .product-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.5rem;
      gap: 0.5rem;
    }
    .product-header h3 {
      margin: 0;
      flex: 1;
      min-width: 0;
      word-wrap: break-word;
      font-size: 1.2rem;
    }
    .product-header .price {
      margin: 0;
      white-space: nowrap;
      flex-shrink: 0;
      color: var(--primary);
      font-weight: bold;
      font-size: 1.4rem;
    }
    
    .desc { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.5rem; flex-grow: 1; }
    
    .buy-btn {
      width: 100%; padding: 0.8rem;
      background: transparent; color: var(--primary);
      border: 2px solid var(--primary); border-radius: 12px;
      cursor: pointer; font-size: 1rem; font-weight: bold;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: all 0.3s ease;
    }
    .buy-btn:hover {
      background: var(--primary); color: white;
      box-shadow: 0 0 10px rgba(var(--primary-rgb), 0.5), 0 0 20px rgba(var(--primary-rgb), 0.3);
      transform: scale(1.02);
    }
    .buy-btn i { font-size: 1.2rem; }

    .demo-btn {
      width: 100%; padding: 0.8rem; margin-top: 0.5rem;
      background: transparent; color: var(--primary);
      border: 2px solid var(--primary); border-radius: 12px;
      cursor: pointer; font-size: 1rem; font-weight: bold;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: all 0.3s ease;
    }
    .demo-btn:hover {
      background: var(--primary); color: white;
      box-shadow: 0 0 10px rgba(var(--primary-rgb), 0.5), 0 0 20px rgba(var(--primary-rgb), 0.3);
      transform: scale(1.02);
    }

    footer { text-align: center; margin-top: 4rem; padding: 1rem; color: var(--text-secondary); font-size: 0.9rem; }

    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.6); display: flex; align-items: center; justify-content: center;
      z-index: 1000; opacity: 0; visibility: hidden; transition: all 0.3s ease; backdrop-filter: blur(4px);
    }
    .modal-overlay.active { opacity: 1; visibility: visible; }
    .modal {
      background: var(--card); padding: 2rem; border-radius: var(--radius);
      max-width: 400px; width: 90%; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
      transform: scale(0.9); transition: transform 0.3s ease; border: 1px solid var(--border);
    }
    .modal-overlay.active .modal { transform: scale(1); }
    .modal h3 { margin-bottom: 1rem; color: var(--text); font-size: 1.3rem; display: flex; align-items: center; gap: 0.5rem; }
    .modal p { color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.95rem; line-height: 1.6; }
    
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; color: var(--text); font-weight: 500; }
    .form-group input {
      width: 100%; padding: 0.75rem; border: 2px solid var(--border); border-radius: 8px;
      font-size: 1rem; background: var(--bg); color: var(--text); transition: all 0.3s;
    }
    .form-group input:focus { outline: none; border-color: var(--primary); }
    .form-group input.error { border-color: var(--error); animation: shake 0.5s ease-in-out; }
    .error-message { color: var(--error); font-size: 0.85rem; margin-top: 0.5rem; display: none; }
    .error-message.show { display: block; }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
      20%, 40%, 60%, 80% { transform: translateX(5px); }
    }

    .modal-buttons { display: flex; gap: 0.75rem; }
    .modal-buttons button {
      flex: 1; padding: 0.75rem; border: none; border-radius: 8px; cursor: pointer;
      font-weight: bold; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    .btn-confirm { background: var(--primary); color: white; }
    .btn-confirm:hover { box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.4); }
    .btn-cancel { background: var(--border); color: var(--text); }
    .btn-cancel:hover { background: #cbd5e1; }
    .btn-copy { background: var(--success); color: white; margin-top: 1rem; width: 100%; }
    .btn-copy:hover { box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4); }
    
    .order-details {
      background: var(--bg); padding: 1rem; border-radius: 8px;
      margin: 1rem 0; font-family: monospace; font-size: 0.9rem; border: 1px solid var(--border);
    }
    .order-details div { margin: 0.5rem 0; display: flex; justify-content: space-between; }
    .order-details strong { color: var(--text); }
    
    .warning-box {
      background: rgba(255, 193, 7, 0.1); border: 1px solid #ffc107;
      border-radius: 8px; padding: 1rem; margin: 1rem 0;
    }
    .warning-box p { margin: 0; color: #d97706; font-weight: 500; }
    
    .payment-info-box {
      background: var(--bg); padding: 1rem; border-radius: 8px;
      margin: 1rem 0; border: 2px solid var(--primary); word-break: break-all;
    }
    .payment-info-box code {
      display: block; padding: 0.5rem; background: var(--card);
      border-radius: 4px; margin-top: 0.5rem; font-size: 0.85rem;
    }

    .demo-modal .modal { max-width: 90%; width: 95%; height: 90%; padding: 0; display: flex; flex-direction: column; }
    .demo-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
      background: var(--card); border-radius: var(--radius) var(--radius) 0 0;
    }
    .demo-header h3 { margin: 0; font-size: 1.1rem; }
    .demo-header .btn-close {
      background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--text);
    }
    .demo-frame {
      flex: 1; border: none; border-radius: 0 0 var(--radius) var(--radius);
      background: #fff;
    }
    .demo-footer {
      padding: 1rem 1.5rem; border-top: 1px solid var(--border);
      background: var(--card); display: flex; gap: 1rem; justify-content: flex-end;
    }
    .btn-buy-full {
      background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem;
      border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 0.5rem;
    }
    .btn-buy-full:hover { box-shadow: 0 4px 12px rgba(var(--primary-rgb), 0.4); }

    [data-theme="dark"] .btn-cancel:hover { background: #475569; }
    @media (max-width: 600px) { 
      .products { grid-template-columns: 1fr; }
      .modal { padding: 1.5rem; }
      .demo-modal .modal { width: 100%; height: 100%; border-radius: 0; }
    }
  </style>
  <script src="lang/ar.js"></script>
  <script src="lang/en.js"></script>
</head>
<body>
  <header>
    <div class="logo">
      <i class="ph-bold ph-package"></i>
      <span id="siteName">منتجات رقمية</span>
    </div>
  </header>

  <main class="products" id="productsGrid"></main>

  <footer>
    <p id="footerText"> Digital Products 2026 ©  </p>
  </footer>

  <!-- نافذة إدخال الإيميل -->
  <div class="modal-overlay" id="emailModal">
    <div class="modal">
      <h3><i class="ph-bold ph-envelope"></i> <span data-i18n="emailTitle">إكمال عملية الشراء</span></h3>
      <p data-i18n="emailDesc">يرجى إدخال بريدك الإلكتروني لإتمام الطلب</p>
      
      <div class="form-group">
        <label for="customerEmail" data-i18n="emailLabel">البريد الإلكتروني *</label>
        <input type="email" id="customerEmail" placeholder="example@email.com" required>
        <div class="error-message" id="emailError" data-i18n="emailError">يرجى إدخال بريد إلكتروني صحيح (أحرف إنجليزية فقط)</div>
      </div>
      
      <div class="modal-buttons">
        <button class="btn-cancel" onclick="closeEmailModal()" data-i18n="cancel">إلغاء</button>
        <button class="btn-confirm" onclick="confirmPurchase(event)" data-i18n="confirm">تأكيد الشراء</button>
      </div>
    </div>
  </div>

  <!-- نافذة النجاح -->
  <div class="modal-overlay" id="successModal">
    <div class="modal">
      <h3 style="color: var(--success);"><i class="ph-bold ph-check-circle"></i> <span data-i18n="successTitle">تم إنشاء طلبك بنجاح!</span></h3>
      <p data-i18n="successDesc">يرجى إتمام الدفع عبر الرابط التالي</p>
      
      <div class="order-details" id="orderDetails"></div>
      <div id="paymentInfoContainer"></div>
      
      <div class="warning-box">
        <p><i class="ph-bold ph-warning"></i> <span data-i18n="warningText">احتفظ بمعلومات الطلب (رقم الطلب، البريد، اسم المنتج) للمتابعة والدعم الفني</span></p>
      </div>
      
      <button class="btn-copy" onclick="copyOrderDetails()">
        <i class="ph-bold ph-copy"></i> <span data-i18n="copyButton">نسخ المعلومات</span>
      </button>
      
      <div class="modal-buttons" style="margin-top: 1rem;">
        <button class="btn-cancel" onclick="closeSuccessModal()" data-i18n="close">إغلاق</button>
      </div>
    </div>
  </div>

  <!-- نافذة الديمو -->
  <div class="modal-overlay demo-modal" id="demoModal">
    <div class="modal">
      <div class="demo-header">
        <h3 id="demoTitle">تجربة المنتج</h3>
        <button class="btn-close" onclick="closeDemoModal()">✕</button>
      </div>
      <iframe class="demo-frame" id="demoFrame" src="about:blank" title="Demo Preview"></iframe>
      <div class="demo-footer">
        <button class="btn-cancel" onclick="closeDemoModal()" data-i18n="close">إغلاق</button>
        <button class="btn-buy-full" onclick="buyFromDemo()">
          <i class="ph-bold ph-unlock"></i> <span data-i18n="buyFull">شراء النسخة الكاملة</span>
        </button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = 'https://digitalstore.dlod6929.workers.dev/api/products';
    const API_ORDERS_URL = API_URL.replace('/products', '/orders');
    const DEMOS_FOLDER = 'demos/';
    
    // ✅ إعدادات مبسطة (تم حذف كل ما يتعلق بـ CWallet)
    const CONFIG = {
      DIRECT_PAYMENT_LINK: 'https://cwallet.com/receive/7ce25e34dce4052ac98c2018f60da4c1',
      CURRENCY: 'USDT'
    };

    let texts = {};

    function loadLanguage(langCode) {
      if (langCode === 'ar') {
        texts = texts_ar;
      } else {
        texts = texts_en;
      }
    }

    const lang = navigator.language.startsWith('ar') ? 'ar' : 'en';
    const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    
    loadLanguage(lang);
    
    let selectedProductId = null;
    let selectedProductName = null;
    let selectedProductPrice = null;
    let selectedProductDemoUrl = null;
    let currentOrderData = null;
    let productsCache = [];
    let currentPaymentUrl = '';

    function applyLanguage() {
      document.documentElement.lang = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.title = texts.siteName;
      document.getElementById('siteName').textContent = texts.siteName;
      document.getElementById('footerText').textContent = texts.footer;
      document.getElementById('demoTitle').textContent = texts.demoTitle;
      
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (texts[key]) el.textContent = texts[key];
      });
      renderProducts();
    }

    function applyTheme() { document.documentElement.setAttribute('data-theme', theme); }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
      document.documentElement.setAttribute('data-theme', e.matches ? 'dark' : 'light');
    });

    async function renderProducts() {
      const grid = document.getElementById('productsGrid');
      grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: var(--text-secondary);">${texts.loadingProducts}</p>`;
      
      try {
        const response = await fetch(API_URL);
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
        
        const result = await response.json();
        if (!result.success) throw new Error(result.error || 'خطأ غير معروف');
        
        const products = result.data;
        productsCache = products;
        
        if (!products || products.length === 0) {
          grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: var(--text-secondary);">${lang === 'ar' ? 'لا توجد منتجات متاحة حالياً' : 'No products available'}</p>`;
          return;
        }
        
        grid.innerHTML = '';
        products.forEach(p => {
          const title = lang === 'ar' ? p.title_ar : p.title_en;
          const priceDisplay = `${p.price} ${p.currency || CONFIG.CURRENCY}`;
          const icon = 'ph-package';
          const hasDemo = p.demo_url && p.demo_url.trim() !== '';
          
          grid.innerHTML += `
            <div class="product-card">
              <div class="product-image"><i class="ph-bold ${icon}"></i></div>
              <div class="product-content">
                <!-- ✅ عنوان المنتج والسعر في صف واحد -->
                <div class="product-header">
                  <h3>${title}</h3>
                  <div class="price">${priceDisplay}</div>
                </div>
                <p class="desc">${lang === 'ar' ? 'منتج رقمي متميز' : 'Premium digital product'}</p>
                <button class="buy-btn" 
                        data-product-id="${p.id}" 
                        data-product-name="${title}"
                        data-product-price="${p.price}"
                        onclick="handleBuyClick(this)">
                  <i class="ph-bold ph-shopping-cart-simple"></i> ${texts.buy}
                </button>
                ${hasDemo ? `<button class="demo-btn" onclick="openDemo('${DEMOS_FOLDER + p.demo_url}', '${title}')">
                  <i class="ph-bold ph-play-circle"></i> ${texts.tryDemo}
                </button>` : ''}
              </div>
            </div>
          `;
        });
      } catch (err) {
        console.error('Error loading products:', err);
        grid.innerHTML = `<p style="text-align:center; grid-column: 1/-1; color: red;">⚠️ ${lang === 'ar' ? 'فشل تحميل المنتجات' : 'Failed to load products'}</p>`;
      }
    }

    function openDemo(demoUrl, productName) {
      selectedProductDemoUrl = demoUrl;
      selectedProductName = productName;
      document.getElementById('demoFrame').src = demoUrl;
      document.getElementById('demoModal').classList.add('active');
      console.log('🎬 Demo opened:', demoUrl);
    }

    function closeDemoModal() {
      document.getElementById('demoModal').classList.remove('active');
      document.getElementById('demoFrame').src = 'about:blank';
      selectedProductDemoUrl = null;
    }

    function buyFromDemo() {
      closeDemoModal();
      if (selectedProductName && selectedProductPrice) {
        openEmailModal(selectedProductId, selectedProductName);
      }
    }

    function handleBuyClick(button) {
      selectedProductId = button.dataset.productId;
      selectedProductName = button.dataset.productName;
      selectedProductPrice = parseFloat(button.dataset.productPrice);
      
      console.log('🛒 Product:', selectedProductName, '| Price:', selectedProductPrice);
      
      if (!selectedProductPrice || isNaN(selectedProductPrice)) {
        console.error('❌ Price not found or invalid:', button.dataset.productPrice);
        alert('⚠️ خطأ في سعر المنتج. يرجى تحديث الصفحة.');
        return;
      }
      
      // ✅ فتح الدفع مباشرة (بدون ديمو)
      openEmailModal(selectedProductId, selectedProductName);
    }

    function openEmailModal(productId, productName) {
      selectedProductId = productId;
      selectedProductName = productName || (lang === 'ar' ? 'منتج غير معروف' : 'Unknown Product');
      document.getElementById('emailModal').classList.add('active');
      document.getElementById('customerEmail').focus();
      clearEmailError();
    }

    function closeEmailModal() {
      document.getElementById('emailModal').classList.remove('active');
      document.getElementById('customerEmail').value = '';
      clearEmailError();
    }

    function clearEmailError() {
      const input = document.getElementById('customerEmail');
      input.classList.remove('error');
      document.getElementById('emailError').classList.remove('show');
      input.style.borderColor = '';
    }

    function showEmailError() {
      const input = document.getElementById('customerEmail');
      input.classList.add('error');
      document.getElementById('emailError').classList.add('show');
      setTimeout(clearEmailError, 3000);
    }

    function isValidEmail(email) {
      return /^[\x00-\x7F]+$/.test(email) && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email) && 
             !email.includes('xn--') && /[a-zA-Z]/.test(email) && email.split('@')[0].length >= 3;
    }

    async function confirmPurchase(event) {
      const emailInput = document.getElementById('customerEmail');
      const email = emailInput.value.trim();
      
      if (!email || !isValidEmail(email)) { showEmailError(); emailInput.focus(); return; }
      
      const price = selectedProductPrice;
      if (!price || price <= 0 || isNaN(price)) {
        alert('⚠️ خطأ: لم يتم تحديد سعر المنتج. يرجى تحديث الصفحة والمحاولة مرة أخرى.');
        console.error('Price issue:', { price, selectedProductPrice });
        return;
      }
      
      if (!selectedProductName) {
        alert('⚠️ خطأ: لم يتم تحديد المنتج. يرجى تحديث الصفحة والمحاولة مرة أخرى.');
        return;
      }
      
      const btn = event.currentTarget;
      const originalHTML = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = `<i class="ph-bold ph-spinner-gap ph-spin"></i> ${texts.processing}`;

      // ✅ طريقة الدفع ثابتة: رابط مباشر فقط
      const orderData = {
        guest_email: email,
        payment_method: "direct_link",
        items: [{ product_id: selectedProductId, quantity: 1 }]
      };

      try {
        const response = await fetch(API_ORDERS_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });

        const result = await response.json();
        console.log('📥 Response:', result);

        if (result.success && result.data?.order_id) {
          closeEmailModal();
          
          currentOrderData = {
            orderId: result.data.order_id,
            product: selectedProductName,
            email: email,
            amount: price
          };

          showPaymentInfo(price);
          showSuccessModal(currentOrderData);
          
          selectedProductId = selectedProductName = selectedProductPrice = selectedProductDemoUrl = null;
          
        } else {
          alert(`${lang === 'ar' ? '⚠️ حدث خطأ: ' : '⚠️ Error: '}${result.error || 'فشل إنشاء الطلب'}`);
        }
      } catch (err) {
        console.error('❌ Purchase error:', err);
        alert(lang === 'ar' ? '⚠️ فشل الاتصال بالخادم' : '⚠️ Failed to connect to server');
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalHTML;
      }
    }

    // ✅ دالة مبسطة لعرض رابط الدفع المباشر فقط
    function showPaymentInfo(amount) {
      const container = document.getElementById('paymentInfoContainer');
      
      const html = `
        <div class="payment-info-box">
          <strong>${texts.paymentLink}</strong>
          <code id="paymentLinkCode">${CONFIG.DIRECT_PAYMENT_LINK}</code>
          <button class="btn-copy" onclick="copyPaymentLink(this)" style="margin-top:0.75rem;padding:0.5rem;font-size:0.9rem;">
            <i class="ph-bold ph-copy"></i> ${texts.copyLink}
          </button>
        </div>
      `;
      container.innerHTML = html;
    }

    function copyPaymentLink(btn) {
      const linkCode = document.getElementById('paymentLinkCode');
      if (linkCode) {
        navigator.clipboard.writeText(linkCode.textContent).then(() => {
          const old = btn.innerHTML;
          btn.innerHTML = `<i class="ph-bold ph-check"></i> ${texts.copied}`;
          setTimeout(() => btn.innerHTML = old, 2000);
        });
      }
    }

    function showSuccessModal(orderData) {
      document.getElementById('orderDetails').innerHTML = `
        <div><strong>${texts.orderId}</strong> <span>${orderData.orderId}</span></div>
        <div><strong>${texts.product}</strong> <span>${orderData.product}</span></div>
        <div><strong>${texts.email}</strong> <span>${orderData.email}</span></div>
        <div><strong>${texts.amount}</strong> <span>${orderData.amount} ${CONFIG.CURRENCY}</span></div>`;
      document.getElementById('successModal').classList.add('active');
    }

    function closeSuccessModal() {
      document.getElementById('successModal').classList.remove('active');
      currentOrderData = null;
      currentPaymentUrl = '';
      document.getElementById('paymentInfoContainer').innerHTML = '';
    }

    function copyOrderDetails() {
      if (!currentOrderData) return;
      const txt = `${texts.orderId} ${currentOrderData.orderId}\n${texts.product} ${currentOrderData.product}\n${texts.email} ${currentOrderData.email}\n${texts.amount} ${currentOrderData.amount} ${CONFIG.CURRENCY}`;
      navigator.clipboard.writeText(txt).then(() => {
        const btn = document.querySelector('#successModal .btn-copy');
        const old = btn.innerHTML;
        btn.innerHTML = `<i class="ph-bold ph-check"></i> ${texts.copied}`;
        setTimeout(() => btn.innerHTML = old, 2000);
      });
    }

    document.querySelectorAll('.modal-overlay').forEach(m => m.addEventListener('click', e => {
      if (e.target === m) {
        if (m.id === 'emailModal') closeEmailModal();
        else if (m.id === 'successModal') closeSuccessModal();
        else if (m.id === 'demoModal') closeDemoModal();
      }
    }));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeEmailModal(); closeSuccessModal(); closeDemoModal(); } });
    document.getElementById('customerEmail').addEventListener('keypress', e => { if (e.key === 'Enter') confirmPurchase(e); });

    const emailEl = document.getElementById('customerEmail');
    emailEl.addEventListener('input', function() {
      this.style.borderColor = this.value.trim() && isValidEmail(this.value.trim()) ? 'var(--success)' : '';
      this.classList.remove('error');
    });
    emailEl.addEventListener('blur', function() {
      if (this.value.trim() && !isValidEmail(this.value.trim())) showEmailError();
    });

    applyLanguage(); applyTheme(); renderProducts();
  </script>
  <script async src="https://cwallet.com/opencx.js"></script>
</body>
</html>
